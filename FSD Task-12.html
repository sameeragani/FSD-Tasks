<!DOCTYPE html>
<html>
<head>
    <title>Pizza Coupon Checker</title>

    <style>

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(to right,#ff9a44,#fc6076);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:420px;
            background:white;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 0 20px gray;
        }

        h1{
            color:#e63946;
        }

        img{
            width:120px;
            margin-bottom:15px;
        }

        input{
            width:90%;
            padding:12px;
            font-size:16px;
            border:1px solid gray;
            border-radius:5px;
            margin-top:15px;
        }

        button{
            width:95%;
            padding:12px;
            margin-top:20px;
            background:#e63946;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#b5172f;
        }

        #message{
            margin-top:20px;
            font-size:18px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🍕 Pizza Coupon Checker</h1>

    <p>Enter your coupon code to get a discount.</p>

    <input type="text"
           id="coupon"
           placeholder="Enter Coupon Code">

    <button onclick="checkCoupon()">
        Check Coupon
    </button>

    <p id="message"></p>

</div>

<script>

function checkCoupon()
{
    var code=document.getElementById("coupon").value;

    if(code=="")
    {
        document.getElementById("message").innerHTML="❌ Please enter a coupon code.";
        document.getElementById("message").style.color="red";
    }

    else if(code=="PIZZA50")
    {
        document.getElementById("message").innerHTML="🎉 Congratulations! You got 50% OFF.";
        document.getElementById("message").style.color="green";
    }

    else
    {
        document.getElementById("message").innerHTML="❌ Invalid Coupon Code.";
        document.getElementById("message").style.color="red";
    }

}

</script>

</body>
</html>
