
<!DOCTYPE html>
<html>
<head>
    <title>Lists in HTML</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            margin: 20px;
        }

        .container{
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1{
            text-align: center;
            color: #0066cc;
            background-color: #d6ebff;
            padding: 10px;
            border-radius: 5px;
        }

        h2{
            color: #ff6600;
        }

        ul{
            background-color: #fff4e6;
            padding: 15px 40px;
            border-radius: 5px;
        }

        ol{
            background-color: #e6ffe6;
            padding: 15px 40px;
            border-radius: 5px;
        }

        li{
            padding: 5px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>My Daily Activities</h1>

    <h2>Unordered List - Hobbies</h2>

    <ul>
        <li>Scrolling Instagram</li>
        <li>Listening to Music</li>
        <li>Watching Movies</li>
        <li>Playing Games</li>
        <li>Drinking Tea</li>
    </ul>

    <h2>Ordered List - Morning Routine</h2>

    <ol>
        <li>Wake Up</li>
        <li>Brush Teeth</li>
        <li>Take a Bath</li>
        <li>Have Breakfast</li>
        <li>Go to College</li>
    </ol>

</div>

</body>
</html>
