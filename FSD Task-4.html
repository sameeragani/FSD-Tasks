
<!DOCTYPE html>
<html>
<head>
    <title><h1>🌎 World Countries and Capitals 🌎</h1></title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #eef7ff;
            margin: 20px;
        }

        h1{
            text-align: center;
            color: #003366;
            background-color: #cce5ff;
            padding: 12px;
            border-radius: 8px;
        }

        table{
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
        }

        th{
            background-color: #0066cc;
            color: white;
            padding: 12px;
        }

        td{
            padding: 10px;
            text-align: center;
        }

        table, th, td{
            border: 1px solid #333;
        }

        tr:nth-child(even){
            background-color: #e6f2ff;
        }

        tr:hover{
            background-color: #d1ecff;
        }
    </style>
</head>

<body>

    <h1>🌍 Countries and Their Capitals 🌍</h1>

    <table>
        <tr>
            <th>Country</th>
            <th>Capital</th>
            <th>Continent</th>
            <th>Currency</th>
        </tr>

        <tr>
            <td>India</td>
            <td>New Delhi</td>
            <td>Asia</td>
            <td>Rupee</td>
        </tr>

        <tr>
            <td>United States</td>
            <td>Washington, D.C.</td>
            <td>North America</td>
            <td>US Dollar</td>
        </tr>

        <tr>
            <td>Japan</td>
            <td>Tokyo</td>
            <td>Asia</td>
            <td>Yen</td>
        </tr>

        <tr>
            <td>France</td>
            <td>Paris</td>
            <td>Europe</td>
            <td>Euro</td>
        </tr>

        <tr>
            <td>Australia</td>
            <td>Canberra</td>
            <td>Australia</td>
            <td>Australian Dollar</td>
        </tr>
    </table>

</body>
</html>
