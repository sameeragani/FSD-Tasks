<!DOCTYPE html>
<html>
<head>
    <title>Theme Changer</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right,#667eea,#764ba2);
            color: white;
            text-align: center;
            transition: 0.5s;
        }

        .container{
            width: 500px;
            margin: 120px auto;
            background: rgba(255,255,255,0.2);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px black;
        }

        h1{
            margin-bottom:20px;
        }

        p{
            font-size:20px;
        }

        button{
            margin-top:20px;
            padding:12px 25px;
            font-size:18px;
            border:none;
            border-radius:30px;
            background:white;
            color:#333;
            cursor:pointer;
        }

        button:hover{
            background:yellow;
        }

        .dark{
            background:#222;
            color:white;
        }
    </style>
</head>

<body>

<div class="container">

<h1>🌙 Theme Changer</h1>

<p id="text">
Click the button to switch between Light Mode and Dark Mode.
</p>

<button id="btn">
Change Theme
</button>

</div>

<script>

var button=document.getElementById("btn");

button.addEventListener("click",changeTheme);

function changeTheme()
{
    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark"))
    {
        document.getElementById("text").innerHTML="Dark Mode Activated 🌙";
    }
    else
    {
        document.getElementById("text").innerHTML="Light Mode Activated ☀️";
    }
}

</script>

</body>
</html>
